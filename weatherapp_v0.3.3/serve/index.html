<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>

    <link href="contents/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="contents/style.css">
</head>

<body>
    <div class="overlay">
        <div class="container-fluid px-5 py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="main-title">
                    Weather Dashboard
                </h1>
                <div class="d-flex gap-2 align-items-center">
                    <span id="userLabel" class="user-label"></span>
                    <a id="loginLink" class="btn btn-outline-light" href="/login">
                        Login
                    </a>
                    <a id="registerLink" class="btn btn-primary" href="/register">
                        Create Account
                    </a>
                    <button id="themeToggle" class="btn btn-light">
                        Dark Mode
                    </button>
                    <button id="logoutBtn" class="btn btn-outline-light d-none">
                        Logout
                    </button>
                </div>
            </div>

            <div class="glass-card p-4 mb-4">
                <div class="row g-3">
                    <div class="col-md-10">
                        <input id="searchInput" type="text" class="form-control form-control-lg"
                            placeholder="Search city...">
                    </div>
                    <div class="col-md-2">
                        <button id="searchBtn" type="button" class="btn btn-primary btn-lg w-100">
                            Search
                        </button>
                    </div>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-lg-4 mb-3">
                    <div class="glass-card weather-card text-center">
                        <div class="weather-icon" id="weatherIcon">
                            <span class="weather-icon-placeholder">--</span>
                        </div>
                        <div class="weather-condition" id="weatherCondition">Updating...</div>
                        <h2 id="cityName">Updating...</h2>
                        <h1 class="weather-temp" id="weatherTemp">Updating...</h1>
                        <p>Humidity: <span id="humidity">Updating...</span></p>
                        <p>Wind: <span id="wind">Updating...</span></p>
                        <button id="addFavoriteBtn" class="btn btn-warning">
                            Add Favorite
                        </button>
                    </div>
                </div>

                <div class="col-lg-8 mb-3">
                    <div class="glass-card chart-card">
                        <h3 class="mb-4">Forecast</h3>
                        <div class="chart-box">
                            <canvas id="forecastChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass-card mb-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3 class="mb-0">City Map</h3>
                    <a id="openMapLink" class="btn btn-outline-primary btn-sm" href="#" target="_blank">
                        Open Larger Map
                    </a>
                </div>
                <div class="map-box">
                    <iframe id="cityMap" title="City map" loading="lazy"></iframe>
                </div>
            </div>

            <div class="glass-card mb-4">
                <h3 class="mb-4">Favorite Cities</h3>
                <div class="row g-3" id="favoritesContainer"></div>
            </div>

            <div class="glass-card">
                <div class="history-header">
                    <h3 class="mb-0">Search History</h3>
                    <button id="clearHistoryBtn" type="button" class="btn btn-outline-danger btn-sm">
                        Clear History
                    </button>
                </div>
                <table class="table">
                    <thead>
                        <tr>
                            <th>City</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="contents/chart.js"></script>
    <script src="contents/script.js"></script>
</body>

</html>
